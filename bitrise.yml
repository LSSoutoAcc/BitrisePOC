---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
app:
  envs:
  - NODE_ENV: development
  - FASTLANE_SKIP_UPDATE_CHECK: '1'
  - FASTLANE_HIDE_TIMESTAMP: '1'
  - WORKDIR: "."
    opts:
      is_expand: false
  - PROJECT_LOCATION: android
    opts:
      is_expand: false
  - MODULE: app
    opts:
      is_expand: false
  - VARIANT: Debug
    opts:
      is_expand: false
  - BITRISE_PROJECT_PATH: ios/BitrisePOC.xcworkspace
    opts:
      is_expand: false
  - BITRISE_SCHEME: BitrisePOC
    opts:
      is_expand: false
  - BITRISE_DISTRIBUTION_METHOD: development
    opts:
      is_expand: false
  - PERSONAL_TEAM_ID: PP4QA5RWRG
    opts:
      is_expand: false
workflows:
  js_validation:
    description: Run lint and tests on development and pull request flows.
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - yarn@2.0:
        inputs:
        - command: install
        - workdir: "$WORKDIR"
    - yarn@2.0:
        inputs:
        - command: test:ci
        - workdir: "$WORKDIR"
    - yarn@2.0:
        inputs:
        - command: lint
        - workdir: "$WORKDIR"
    - script@1:
        title: Collect coverage and junit artifacts
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail

            echo "BITRISE_TEST_RESULT_DIR: $BITRISE_TEST_RESULT_DIR"
            echo "BITRISE_DEPLOY_DIR: $BITRISE_DEPLOY_DIR"

            echo "Test results directory contents:"
            ls -la "$BITRISE_TEST_RESULT_DIR" || true

            if [ -f "./coverage/junit.xml" ]; then
              echo "Junit test results:"
              head -n 20 "./coverage/junit.xml" || true
              cp "./coverage/junit.xml" "$BITRISE_DEPLOY_DIR/junit.xml"
            else
              echo "WARNING: junit.xml not found at ./coverage/junit.xml"
            fi


            if [ -d "coverage/lcov-report" ]; then
              mkdir -p "$BITRISE_DEPLOY_DIR/coverage"
              cp -R coverage/lcov-report/. "$BITRISE_DEPLOY_DIR/coverage/"
            fi

            ls -la "$BITRISE_DEPLOY_DIR"
    - custom-test-results-export@1:
        inputs:
        - test_name: Upload javascript tests
        - base_path: "$BITRISE_DEPLOY_DIR"
        - search_pattern: "junit.xml"
    - deploy-to-bitrise-io@2:
        title: Upload test and coverage artifacts
    - save-npm-cache@1: {}
  js_build_deploy:
    description: Build and deploy JS artifacts for inside libs.
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - yarn@2.0:
        inputs:
        - command: install
        - workdir: "$WORKDIR"
    - yarn@2.0:
        inputs:
        - command: build
        - workdir: "$WORKDIR"
    - yarn@2.0:
        inputs:
        - command: deploy_nexus
        - workdir: "$WORKDIR"
    - save-npm-cache@1: {}
  set_env_dev:
    envs:
    - API_URL: www.api-dev.com/api
    - NODE_ENV: development
    steps: []
  set_env_prod:
    envs:
    - API_URL: www.api-prod.com/api
    - NODE_ENV: production
    steps: []
  android_build:
    description: Build Android artifact for release and hotfix validations.
    steps:
    - git-clone@8: {}
    - yarn@0:
        inputs:
        - command: install
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - npm@3:
        title: Gradlew - Assemble Debug
        inputs:
        - workdir: "$WORKDIR"
        - command: run build:android
    - deploy-to-bitrise-io@2:
        title: Upload APK
        inputs:
        - deploy_path: "$BITRISE_SOURCE_DIR/android/app/build/outputs/apk/debug"
  ios_build:
    description: Build iOS dependencies for release and hotfix validations.
    meta:
      bitrise.io:
        stack: osx-xcode-26.6.x
        machine_type_id: g2.mac.large
    steps:
    - git-clone@8: {}
    - yarn@0:
        inputs:
        - command: install
    - cocoapods-install@3:
        inputs:
        - is_cache_disabled: 'true'
  generate_changelog_qa:
    description: Changelog generation for QA release branches.
    steps:
    - yarn@2.0:
        inputs:
        - command: install
        - workdir: "$WORKDIR"
    - yarn@2.0:
        inputs:
        - command: release:qa
        - workdir: "$WORKDIR"
  generate_changelog_prod:
    description: Changelog generation for PROD release branches
    steps:
    - yarn@2.0:
        inputs:
        - command: install
        - workdir: "$WORKDIR"
    - yarn@2.0:
        inputs:
        - command: release:prod
        - workdir: "$WORKDIR"
  hotfix_validation:
    description: Validate ACC hotfix branches before production merge.
    before_run:
    - js_validation
    - android_build
    - ios_build
  notificate:
    steps:
    - slack@4: {}
trigger_map:
- pull_request_source_branch:
    regex: (feature|bugfix|poc|strategic|hotfix)\/.*
  workflow: js_validation
- push_branch:
    regex: (develop|main)
  workflow: js_validation
- push_branch:
    regex: release\/qa\/.*
  pipeline: release_qa
- push_branch:
    regex: release\/prod\/.*
  pipeline: release_prod
- push_branch:
    regex: hotfix\/.*
  workflow: hotfix_validation
pipelines:
  feature_dev:
    workflows:
      js_validation: {}
      set_env_dev:
        depends_on:
        - js_validation
      android_build:
        depends_on:
        - set_env_dev
      ios_build:
        depends_on:
        - set_env_dev
      notificate:
        depends_on:
        - ios_build
        - android_build
  feature_prod:
    workflows:
      js_validation: {}
      set_env_prod:
        depends_on:
        - js_validation
      android_build:
        depends_on:
        - set_env_prod
      ios_build:
        depends_on:
        - set_env_prod
      notificate:
        depends_on:
        - ios_build
        - android_build
  lib:
    workflows:
      js_validation: {}
      js_build_deploy:
        depends_on:
        - js_validation
      notificate:
        depends_on:
        - js_build_deploy
  release_qa:
    workflows:
      js_validation: {}
      set_env_dev:
        depends_on:
        - js_validation
      ios_build:
        depends_on:
        - set_env_dev
      android_build:
        depends_on:
        - set_env_dev
      generate_changelog_qa:
        depends_on:
        - ios_build
        - android_build
      notificate:
        depends_on:
        - generate_changelog_qa
  release_prod:
    workflows:
      js_validation: {}
      set_env_prod:
        depends_on:
        - js_validation
      ios_build:
        depends_on:
        - set_env_prod
      android_build:
        depends_on:
        - set_env_prod
      generate_changelog_prod:
        depends_on:
        - ios_build
        - android_build
      notificate:
        depends_on:
        - generate_changelog_prod
