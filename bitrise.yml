format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

app:
  envs:
    - NODE_ENV: production

workflows:
  primary:
    description: CI — testa e builda o app
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}

      - node@1:
          inputs:
            - node_version: "23"

      - npm@1:
          title: Install dependencies
          inputs:
            - command: install

      - npm@1:
          title: Run lint
          inputs:
            - command: run lint

      - npm@1:
          title: Run tests
          inputs:
            - command: test -- --watchAll=false

      # Android
      - android-build@1:
          inputs:
            - project_location: $BITRISE_SOURCE_DIR/android
            - variant: release

      # iOS (apenas em stacks macOS)
      # - xcode-archive@5:
      #     inputs:
      #       - project_path: $BITRISE_SOURCE_DIR/ios/BitrisePOC.xcworkspace
      #       - scheme: BitrisePOC

      - deploy-to-bitrise-io@2: {}